<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GreenDotRDMA{% endblock %}</title>
  <link rel="stylesheet" href="/static/pico.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body hx-headers='{"X-Greendot-Csrf":"{{ user.csrf }}"}'>
  <nav class="sidebar">
    <div class="brand"><span class="dot dot-green"></span> GreenDotRDMA</div>
    <p class="brand-sub">NVMe-oF · iSCSI · RDMA</p>
    <a href="/">Dashboard</a>
    <span class="nav-label">Manage</span>
    <a href="/disks">Disks</a>
    <a href="/zfs">ZFS</a>
    <a href="/lvm">LVM</a>
    <a href="/nvme">NVMe-oF</a>
    <a href="/iscsi">iSCSI</a>
    <a href="/nfs">NFS</a>
    <a href="/snapshots">Snapshots</a>
    <span class="nav-label">Observe</span>
    <a href="/connections">Connections</a>
    <a href="/charts">Charts</a>
    <a href="/tasks">Tasks</a>
    <span class="nav-label">System</span>
    <a href="/settings">Settings</a>
    <span class="nav-label">Help</span>
    <a href="/docs/democratic-csi">democratic-csi</a>
    <div class="sidebar-footer">
      <span class="muted">{{ user.username }}</span>
      <button class="linklike" hx-post="/logout">Sign out</button>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Mark the current section in the rail (no server round-trip needed).
    (function () {
      var path = location.pathname;
      document.querySelectorAll(".sidebar a").forEach(function (a) {
        var href = a.getAttribute("href");
        if (href === path || (href !== "/" && path.indexOf(href) === 0)) {
          a.setAttribute("aria-current", "page");
        }
      });
    })();
  </script>
</body>
</html>
